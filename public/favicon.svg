<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Otto favicon: bold O mark with lime green accent -->
  <defs>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BEF264"/>
      <stop offset="100%" stop-color="#a8e020"/>
    </linearGradient>
  </defs>
  <!-- Base rounded square -->
  <rect width="100" height="100" rx="22" fill="#1c1c1e"/>
  <!-- Otto O letterform -->
  <text x="50" y="72"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="68"
    font-weight="800"
    fill="#fafaf9"
    text-anchor="middle"
    letter-spacing="-2">Ot</text>
  <!-- Lime accent dot -->
  <circle cx="75" cy="72" r="8" fill="url(#lime)"/>
</svg>